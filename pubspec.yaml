name: quiz_learning_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  intl: ^0.20.2
  retrofit: ^4.9.2
  riverpod: ^3.2.1
  go_router: ^17.1.0
  flutter_gen: ^5.12.0
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  json_annotation: ^4.11.0
  flutter_riverpod: ^3.2.1
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.7
  open_trivia_db: ^1.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.11.1
  riverpod_lint: ^3.1.3
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_gen_runner: ^5.12.0
  retrofit_generator: ^10.2.1
dependency_overrides:
  dio: ^5.9.1
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
flutter_gen:
  assets:
  output: lib/src/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter_native_splash:
 android: true
 ios: true
 web: true
 color: "#FFFFFF"
 image: assets/images/logo.png
 android_12:
   color: "#FFFFFF"
   image: assets/images/logo.png